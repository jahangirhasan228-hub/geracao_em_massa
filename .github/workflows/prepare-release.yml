name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.8.0 or v0.8.0"
        required: true
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Create Version Bump Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Resolve release inputs
        id: release
        run: |
          RAW_VERSION="${{ inputs.version }}"
          VERSION="${RAW_VERSION#v}"
          TAG_NAME="v${VERSION}"
          BRANCH_NAME="release/${TAG_NAME}"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          BRANCH_EXISTS="false"

          if ! echo "${TAG_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Release version must use semver, for example 0.8.0 or v0.8.0-beta.1"
            exit 1
          fi

          if [ "${VERSION}" = "${CURRENT_VERSION}" ]; then
            echo "package.json is already at ${VERSION}"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists"
            exit 1
          fi

          if git ls-remote --exit-code --heads origin "${BRANCH_NAME}" >/dev/null 2>&1; then
            BRANCH_EXISTS="true"
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "branch_name=${BRANCH_NAME}" >> "${GITHUB_OUTPUT}"
          echo "branch_exists=${BRANCH_EXISTS}" >> "${GITHUB_OUTPUT}"

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        run: |
          BRANCH_NAME="${{ steps.release.outputs.branch_name }}"
          VERSION="${{ steps.release.outputs.version }}"
          BRANCH_EXISTS="${{ steps.release.outputs.branch_exists }}"

          if [ "${BRANCH_EXISTS}" = "true" ]; then
            echo "Branch ${BRANCH_NAME} already exists. Skipping version bump and reusing it for PR creation."
            exit 0
          fi

          git switch -c "${BRANCH_NAME}"
          npm version "${VERSION}" --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${VERSION}"
          git push origin "${BRANCH_NAME}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          BRANCH_NAME="${{ steps.release.outputs.branch_name }}"

          EXISTING_PR="$(
            gh pr list \
              --head "${BRANCH_NAME}" \
              --json url \
              --jq '.[0].url // ""'
          )"

          if [ -n "${EXISTING_PR}" ]; then
            echo "release_pr_url=${EXISTING_PR}" >> "${GITHUB_ENV}"
            echo "Pull request already exists: ${EXISTING_PR}" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          set +e
          PR_URL="$(
            gh pr create \
              --base main \
              --head "${BRANCH_NAME}" \
              --title "chore: prepare ${TAG_NAME}" \
              --body "## O que mudou

          - Atualiza package.json e package-lock.json para ${VERSION}.
          - Prepara a release ${TAG_NAME}.

          ## Depois do merge

          O workflow Auto Release From Main vai validar a main, criar a tag ${TAG_NAME} e gerar a GitHub Release automaticamente."
            2>pr-error.log
          )"
          CREATE_PR_STATUS=$?
          set -e

          if [ "${CREATE_PR_STATUS}" -ne 0 ]; then
            cat pr-error.log

            if grep -Eq "not permitted to create|Resource not accessible by integration" pr-error.log; then
              echo ""
              echo "GitHub Actions is not allowed to create pull requests in this repository."
              echo ""
              echo "Enable it in:"
              echo "Settings > Actions > General > Workflow permissions"
              echo ""
              echo "Turn on:"
              echo "Allow GitHub Actions to create and approve pull requests"
            fi

            exit "${CREATE_PR_STATUS}"
          fi

          echo "release_pr_url=${PR_URL}" >> "${GITHUB_ENV}"
          echo "Created ${PR_URL}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Trigger PR checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="${{ steps.release.outputs.branch_name }}"

          gh workflow run ci.yml --ref "${BRANCH_NAME}"
          gh workflow run codeql.yml --ref "${BRANCH_NAME}"

          {
            echo ""
            echo "Triggered checks for ${BRANCH_NAME}:"
            echo "- CI"
            echo "- CodeQL"
          } >> "${GITHUB_STEP_SUMMARY}"
