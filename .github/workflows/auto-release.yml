name: Auto Release From Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  auto-release:
    name: Tag and Release New Package Version
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Coverage
        run: npm run test:coverage

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Resolve release tag
        id: release-tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="v${PACKAGE_VERSION}"

          if ! echo "${TAG_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Package version ${PACKAGE_VERSION} does not produce a valid semver tag"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists. Skipping release."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "should_release=true" >> "${GITHUB_OUTPUT}"

      - name: Configure Git author
        if: steps.release-tag.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.release-tag.outputs.should_release == 'true'
        run: |
          TAG_NAME="${{ steps.release-tag.outputs.tag_name }}"
          git tag -a "${TAG_NAME}" -m "${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Create GitHub Release
        if: steps.release-tag.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.release-tag.outputs.tag_name }}"
          gh release create "${TAG_NAME}" --title "${TAG_NAME}" --generate-notes --verify-tag
